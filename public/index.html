<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>CRM WEB - CONFIG</title>

   <style>
      body {
         margin: 0;
         font-family: Arial;
         background: #0b1220;
         color: white;
      }

      .topbar {
         padding: 16px;
         background: #0f172a;
         border-bottom: 1px solid #1e293b;
         font-weight: bold;
      }

      .menu {
         display: flex;
         gap: 10px;
         padding: 12px;
         background: #0b1220;
         overflow-x: auto;
         border-bottom: 1px solid #1e293b;
      }

      .tab {
         flex: 0 0 auto;
         padding: 10px 14px;
         background: #111827;
         border: 1px solid #1e293b;
         border-radius: 10px;
         cursor: pointer;
      }

      /* 🔥 GRID BALANCEADO */
      .grid {
         display: grid;
         grid-template-columns: repeat(4, 1fr);
         gap: 12px;
         padding: 18px;
      }

      .card {
         background: #111827;
         border: 1px solid #1e293b;
         border-radius: 12px;
         padding: 16px;
         min-height: 110px;
      }

      .panel {
         margin: 0 15px 15px 15px;
         background: #0f172a;
         border: 1px solid #1e293b;
         border-radius: 12px;
         padding: 15px;
         min-height: 320px;
      }

      .title {
         font-weight: bold;
         color: #60a5fa;
      }

      .small {
         font-size: 13px;
         opacity: 0.8;
      }

      .crm-btn {
         display: inline-block;
         margin-top: 10px;
         padding: 10px 14px;
         background: #2563eb;
         color: white;
         border-radius: 10px;
         text-decoration: none;
      }

      table {
         width: 100%;
         border-collapse: collapse;
         font-size: 13px;
      }

      th {
         text-align: left;
         padding: 8px;
         border-bottom: 1px solid #334155;
         color: #93c5fd;
      }

      td {
         padding: 8px;
         border-bottom: 1px solid #1e293b;
      }

      tr:hover {
         background: #111827;
      }

      .departamentos-layout {
         display: grid;
         grid-template-columns: 2fr 1fr;
         gap: 15px;
      }
   </style>
</head>

<body>

   <div class="topbar">
      ⚙ CONFIGURACIONES / CRM WEB
   </div>

   <div class="menu">
      <div class="tab" onclick="load('inicio')">🏠 Inicio</div>
      <div class="tab" onclick="load('ciudades')">🌆 Ciudades</div>
      <div class="tab" onclick="load('departamentos')">🏢 Departamentos</div>
      <div class="tab" onclick="load('sectores')">📍 Sectores</div>
      <div class="tab" onclick="load('contactos')">👥 Contactos</div>
      <div class="tab" onclick="load('sucursales')">🏬 Sucursales</div>
      <div class="tab" onclick="load('usuarios')">👤 Usuarios</div>
      <div class="tab" onclick="load('mensajes')">✉ Mensajes</div>
   </div>

   <!-- SOLO PANEL -->
   <div class="panel" id="panel"></div>

   <script>

      function renderHome() {
         document.getElementById("panel").innerHTML = `
            <div class="grid">

               <div class="card">
                  <div class="title">Resumen Sistema</div>
                  <div class="small">Panel de control administrativo</div>
               </div>

               <div class="card">
                  <div class="title">Actividad</div>
                  <div class="small">Sin eventos recientes</div>
               </div>

               <div class="card">
                  <div class="title">Estado API</div>
                  <div class="small">Conectado</div>
               </div>

               <div class="card">
                  <div class="title">Base de Datos</div>
                  <div class="small">MySQL activo</div>
               </div>

               <div class="card">
                  <div class="title">Módulos</div>
                  <div class="small">8 activos</div>
               </div>

               <div class="card">
                  <div class="title">Seguridad</div>
                  <div class="small">OK</div>
               </div>

               <div class="card">
                  <div class="title">Rendimiento</div>
                  <div class="small">Estable</div>
               </div>

               <div class="card">
                  <div class="title">CRM Sistema</div>
                  <div class="small">Versión inicial</div>
               </div>

            </div>
         `;
      }

      function load(page) {

         // 🔥 SOLO INICIO MUESTRA CARDS
         if (page === 'inicio') {
            renderHome();
            return;
         }

         // 🔥 DEPARTAMENTOS
         if (page === 'departamentos') {

            fetch("/departamentos")
               .then(res => res.json())
               .then(data => {

                  data.sort((a, b) => a.id - b.id);

                  let html = `
                     <div class="departamentos-layout">

                        <div>
                           <div class="title">DEPARTAMENTOS</div>
                           <br>
                           <table>
                              <thead>
                                 <tr>
                                    <th style="width:60px;">ID</th>
                                    <th>Departamento</th>
                                 </tr>
                              </thead>
                              <tbody>
                  `;

                  data.forEach(d => {
                     html += `
                        <tr>
                           <td style="width:60px;">${d.id}</td>
                           <td>${d.depto}</td>
                        </tr>
                     `;
                  });

                  html += `
                              </tbody>
                           </table>
                        </div>

                        <div class="card">
                           <div class="title">FORMULARIO</div>
                           <div class="small">Aquí irá CRUD</div>
                        </div>

                     </div>
                  `;

                  document.getElementById("panel").innerHTML = html;
               });

            return;
         }

         // 🔥 OTROS MÓDULOS
         document.getElementById("panel").innerHTML = `
            <div class="grid">

               <div class="card">
                  <div class="title">Módulo</div>
                  <div class="small">${page.toUpperCase()}</div>
               </div>

            </div>
         `;
      }

      // INIT
      renderHome();

   </script>

</body>

</html>
